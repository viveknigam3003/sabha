[build]
# The Dockerfile expects all three repos (sabha, argus, narada) at the same
# level. Use the sabha repo root as the build context and pass the Dockerfile
# path explicitly. In Railway, set the root directory to the parent of all
# three repos and reference this Dockerfile, OR use the build script approach
# below to copy sibling repos into the build context first.
#
# Simplest Railway setup:
#   1. Push sabha + argus + narada to a single repo (or use a monorepo wrapper).
#   2. Set Railway's Root Directory to the repo root containing sabha/.
#   3. Railway picks up this railway.toml automatically.
dockerfilePath = "Dockerfile"
buildCommand   = ""

[deploy]
startCommand    = "node packages/mcp-server/dist/index.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"

# ── Required env vars (set in Railway dashboard) ─────────────────────────────
#
# SABHA_USER_KEYS          JSON map of API key → email
#                          e.g. '{"sk-abc123":"alice@acme.com"}'
#
# SABHA_ALLOWLIST_HASHES   JSON array of SHA-256 hex hashes of allowed emails
#                          e.g. '["<sha256 of alice@acme.com>"]'
#
# SABHA_POSTHOG_KEY        PostHog write-only capture key
#
# PORT                     Set automatically by Railway (default 3000)
#
# SABHA_DATA_ROOT          Path for per-user config/registry (default /var/sabha-data)
