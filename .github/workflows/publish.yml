name: publish

# Build, test, and publish the @sabhahq/* packages to npm on a GitHub Release,
# using npm Trusted Publishing (OIDC) — NO long-lived NPM_TOKEN. pnpm performs
# the OIDC token exchange per workspace package (pnpm/pnpm#11495), so each
# package authenticates via the workflow's GitHub identity.
#
# One-time setup on npmjs.com: configure a Trusted Publisher for BOTH
# @sabhahq/telemetry and @sabhahq/core →
#   Publisher: GitHub Actions · Owner: viveknigam3003 · Repo: sabha
#   Workflow filename: publish.yml
# (Brand-new packages must be created by a first manual `pnpm publish --otp=…`
# before a trusted publisher can be attached; after that, this runs tokenless.)
#
# Tag the release with the semver you want published; package versions in
# packages/*/package.json must already match. pnpm rewrites the `workspace:*`
# dep on @sabhahq/telemetry to the concrete version at pack time.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm CLI >= 11.5.1; Node 20 ships an older npm.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Build/test ONLY the published packages (+ their deps). The private
      # @sabhahq/mcp-server is deliberately excluded: it depends on @argus/* and
      # @narada/* via workspace links to sibling repos that aren't checked out in
      # CI, so a recursive `pnpm -r build` would fail to resolve them. It's never
      # published, so it has no place in the release pipeline.
      - run: pnpm --filter @sabhahq/telemetry --filter @sabhahq/core build

      - run: pnpm --filter @sabhahq/telemetry --filter @sabhahq/core test

      - run: node scripts/validate.mjs

      # publish telemetry first (core depends on it), then core. Auth is OIDC —
      # no NODE_AUTH_TOKEN. --no-git-checks because the release tag is already cut.
      - name: publish @sabhahq/telemetry
        run: pnpm --filter @sabhahq/telemetry publish --no-git-checks

      - name: publish @sabhahq/core
        run: pnpm --filter @sabhahq/core publish --no-git-checks
